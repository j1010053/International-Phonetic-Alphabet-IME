# Rime schema: IPA
# encoding: utf-8
# 由 gen_rime.py 產生 (lang=zh)
schema:
  schema_id: ipa
  name: "IPA 國際音標"
  version: "0.1.1"
  author:
    - "IPA IME 專案"
  description: |
    國際音標(IPA)輸入方案(POC)。四層編碼:X-SAMPA、描述式、助記、Praat。注音式:候選確認、Enter 上屏。

switches:
  - name: ascii_mode
    reset: 0
    states: [ "IPA", "ABC" ]

engine:
  processors:
    - ascii_composer
    - recognizer
    - key_binder
    - speller
    - punctuator
    - selector
    - navigator
    - fluid_editor        # 語句流編輯器: 選字累積於緩衝, Enter 整串上屏 (POC 驗證點 1)
  segmentors:
    - ascii_segmentor
    - matcher
    - abc_segmentor
    - punct_segmentor
    - fallback_segmentor
  translators:
    - punct_translator
    - table_translator

speller:
  alphabet: '!"%&''()+,-./0123456789:<=>?@ABCDEFGHIJKLMNOQRSTUVWXYZ\^_`abcdefghijklmnopqrstuvwxyz{|}~'
  delimiter: " ;"
  auto_select: false      # 注音式: 唯一匹配不自動上屏 (POC 驗證點 2)

translator:
  dictionary: ipa
  enable_completion: true # 前綴補全候選
  enable_sentence: true
  enable_encoder: false
  enable_user_dict: false

menu:
  page_size: 9

# numpad 綁為選字鍵(主鍵盤數字列送字面數字供 | / ^ 碼使用) (POC 驗證點 7)
key_binder:
  import_preset: default
  bindings:
    - { when: has_menu, accept: KP_1, send: 1 }
    - { when: has_menu, accept: KP_2, send: 2 }
    - { when: has_menu, accept: KP_3, send: 3 }
    - { when: has_menu, accept: KP_4, send: 4 }
    - { when: has_menu, accept: KP_5, send: 5 }
    - { when: has_menu, accept: KP_6, send: 6 }
    - { when: has_menu, accept: KP_7, send: 7 }
    - { when: has_menu, accept: KP_8, send: 8 }
    - { when: has_menu, accept: KP_9, send: 9 }

# 自訂標點:僅保留少數「非碼」標點即時上屏;. | \ 等已在 alphabet 中者不列入,
# 讓 speller 於組字時取用(修 V3-b: \t. 尾端 . 不再延遲) (POC 驗證點 3)
punctuator:
  half_shape:
    ",": {commit: ", "}
    "?": {commit: "? "}
    "!": {commit: "! "}

recognizer:
  import_preset: default
  patterns:
    # 保證以 \ 起首的 Praat 碼(含 \t. 等含標點者)全段落入 speller
    ipa_code: "^\\[a-zA-Z0-9].*$"
